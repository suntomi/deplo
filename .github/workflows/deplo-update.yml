# generated by deplo CLI https://github.com/suntomi/deplo don't edit by hand.
name: Deplo Update

on:
  workflow_dispatch:
    inputs:
      version:
        required: false
        description: Target deplo version. If empty, the latest GitHub release is used.
  schedule:
    - cron: 17 3 * * *

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  DEPLO_UPDATE_CURRENT_VERSION: nightly
  DEPLO_UPDATE_VERSION_PATTERN: ${{ vars.DEPLO_UPDATE_VERSION_PATTERN || '^[0-9]+\.[0-9]+\.[0-9]+$' }}
  SUNTOMI_AWS_ROLE: ${{ secrets.SUNTOMI_AWS_ROLE }}
  SUNTOMI_VCS_ACCOUNT: ${{ secrets.SUNTOMI_VCS_ACCOUNT }}
  SUNTOMI_VCS_ACCOUNT_EMAIL: ${{ secrets.SUNTOMI_VCS_ACCOUNT_EMAIL }}
  SUNTOMI_VCS_ACCOUNT_KEY: ${{ secrets.SUNTOMI_VCS_ACCOUNT_KEY }}
  SUNTOMI_VCS_APP_ID: ${{ secrets.SUNTOMI_VCS_APP_ID }}
  SUNTOMI_VCS_APP_PKEY: ${{ secrets.SUNTOMI_VCS_APP_PKEY }}
  SUNTOMI_VARS1: ${{ vars.SUNTOMI_VARS1 }}
  SUNTOMI_VARS2: ${{ vars.SUNTOMI_VARS2 }}
  SUNTOMI_VARS3: ${{ vars.SUNTOMI_VARS3 }}
  SUNTOMI_VARS4: ${{ vars.SUNTOMI_VARS4 }}

jobs:
  deplo-update:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch deplo cli
        run: |
          curl -L https://github.com/suntomi/deplo/releases/download/nightly/deplo-Linux-$(uname -m) -o /usr/local/bin/deplo
          chmod +x /usr/local/bin/deplo
      - name: Get GitHub App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.SUNTOMI_VCS_APP_ID }}
          private-key: ${{ secrets.SUNTOMI_VCS_APP_PKEY }}
          owner: ${{ github.repository_owner }}
      - name: Fetch repository cache
        id: fetch-repository-cache
        uses: actions/cache@v5
        with:
          path: .git
          key: deplo-git-v1-FF20A2BE8FC59416-${{ github.sha }}
          restore-keys:
            deplo-git-v1-FF20A2BE8FC59416-
      - name: Checkout
        if: steps.fetch-repository-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
      - name: Restore repository from cache
        if: steps.fetch-repository-cache.outputs.cache-hit == 'true'
        run: git reset --hard HEAD && git submodule update --init --recursive && deplo -v=1 ci restore-cache --submodules
        shell: bash
      - name: Resolve deplo version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          current="$DEPLO_UPDATE_CURRENT_VERSION"
          requested="${{ github.event.inputs.version || '' }}"
          latest="$requested"
          if [ -z "$latest" ]; then
            latest=$(curl -fsSL https://api.github.com/repos/suntomi/deplo/releases/latest | jq -r '.tag_name // empty')
          fi
          if [ -z "$latest" ]; then
            echo "failed to resolve latest deplo version" >&2
            exit 1
          fi
          if ! printf '%s' "$latest" | grep -Eq "$DEPLO_UPDATE_VERSION_PATTERN"; then
            echo "deplo version $latest does not match update pattern $DEPLO_UPDATE_VERSION_PATTERN"
            echo "should_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$latest" = "$current" ]; then
            echo "deplo is already up to date: $current"
            echo "should_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_update=true" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
      - name: Download latest deplo
        if: steps.version.outputs.should_update == 'true'
        shell: bash
        run: |
          set -euo pipefail
          latest="${{ steps.version.outputs.latest }}"
          curl -fL "https://github.com/suntomi/deplo/releases/download/$latest/deplo-Linux-$(uname -m)" -o /tmp/deplo-latest
          chmod +x /tmp/deplo-latest
      - name: Regenerate deplo files
        if: steps.version.outputs.should_update == 'true'
        shell: bash
        run: |
          set -euo pipefail
          /tmp/deplo-latest init
      - name: Commit update
        if: steps.version.outputs.should_update == 'true'
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          latest="${{ steps.version.outputs.latest }}"
          branch="deplo/update-$latest"
          base="${{ github.event.repository.default_branch }}"
          git config user.name "deplo[bot]"
          git config user.email "deplo[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add deplow .github/workflows
          if git diff --cached --quiet; then
            echo "no generated deplo file changes"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update deplo to $latest"
          git push --force-with-lease origin "$branch"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"
      - name: Prepare update pull requests
        id: update-prs
        if: steps.commit.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          latest="${{ steps.version.outputs.latest }}"
          expected_title="Update deplo to $latest"
          echo "same_version_found=false" >> "$GITHUB_OUTPUT"
          /tmp/deplo-latest vcs label create deplo-update -c FFFF00 || true
          open_update_prs=$(/tmp/deplo-latest vcs pr search -f state=open -f labels=deplo-update)
          printf '%s' "$open_update_prs" | jq -c '.[]' | while read -r pr; do
            title=$(printf '%s' "$pr" | jq -r '.title')
            url=$(printf '%s' "$pr" | jq -r '.html_url')
            if [ -n "$url" ]; then
              if [ "$title" = "$expected_title" ]; then
                echo "same version deplo update pull request already exists: $url"
                echo "same_version_found=true" >> "$GITHUB_OUTPUT"
              else
                /tmp/deplo-latest vcs pr close "$url" -o message="Closing superseded deplo update pull request."
              fi
            fi
          done
      - name: Create update pull request
        if: steps.commit.outputs.has_changes == 'true' && steps.update-prs.outputs.same_version_found != 'true'
        shell: bash
        run: |
          set -euo pipefail
          latest="${{ steps.version.outputs.latest }}"
          branch="${{ steps.commit.outputs.branch }}"
          base="${{ steps.commit.outputs.base }}"
          /tmp/deplo-latest vcs pr create \
            -o title="Update deplo to $latest" \
            -o head="$branch" \
            -o base="$base" \
            -o body="Updates generated deplo wrapper and workflow files to $latest." \
            -o labels='["deplo-update"]'
